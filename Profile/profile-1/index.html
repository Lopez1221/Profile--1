<style>
    body { 
        font-family: 'Courier New', Courier, monospace; 
        display: flex; 
        justify-content: center; 
        align-items: center;
        height: 100vh;
        margin: 0;
        background: #0d0d0d; /* Dark Shinobi background */
    }
    .card { 
        background: #1a1a1a; 
        padding: 40px; 
        border-radius: 20px; 
        box-shadow: 0 0 20px #ff0000; /* Red glow */
        width: 320px; 
        text-align: center; 
        border: 2px solid #ff0000;
        position: relative;
        overflow: hidden;
    }
    /* Simple Cloud Pattern Detail */
    .card::before {
        content: "☁";
        position: absolute;
        top: -10px;
        right: -10px;
        font-size: 5rem;
        color: rgba(255, 0, 0, 0.1);
        z-index: 0;
    }
    img { 
        width: 130px; 
        height: 130px; 
        border-radius: 50%; 
        border: 4px solid #ff0000; 
        margin-bottom: 20px; 
        position: relative;
        z-index: 1;
        object-fit: cover;
    }
    h2 { 
        margin: 10px 0; 
        color: #eee; 
        text-transform: uppercase;
        letter-spacing: 2px;
    }
    p { 
        color: #bbb; 
        margin: 8px 0; 
        font-size: 0.9rem;
    }
    .label { 
        font-weight: bold; 
        color: #ff0000; 
        text-shadow: 1px 1px 2px #000;
    }
</style>

<body>
    <div class="card">
        <img src="me.jpg.jpg" alt="Rogie C. Lopez">
        
        <h2>Rogie C Lopez</h2>
        <p><span class="label">LOCATION:</span> Poblacion, Buug</p>
        <p><span class="label">Course:</span> BSIT</p>
        <p><span class="label">Year:</span> 1st Year</p>
    </div>
</body>
